[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv
upload_speed = 921600
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI
  https://github.com/PaulStoffregen/XPT2046_Touchscreen
  https://github.com/T-vK/ESP32-BLE-Keyboard

build_flags =
  ; TFT_eSPI — full config via build flags, no User_Setup.h needed
  -DUSER_SETUP_LOADED
  -DILI9341_2_DRIVER
  -DUSE_HSPI_PORT
  -DTFT_MISO=12
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  -DTFT_BL=21
  -DTFT_BACKLIGHT_ON=1
  -DSPI_FREQUENCY=55000000
  -DSPI_READ_FREQUENCY=20000000
  -DLOAD_GLCD
  -DLOAD_FONT2
  -DLOAD_FONT4
  -DLOAD_GFXFF
  -DSMOOTH_FONT
  ; BLE — using classic Bluedroid stack (NimBLE 2.x incompatible with ESP32-BLE-Keyboard 0.3.2)
